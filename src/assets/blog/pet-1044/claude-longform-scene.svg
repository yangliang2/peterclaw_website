<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#1a1a2e"/>
  <rect x="20" y="20" width="760" height="460" rx="8" fill="#16213e" stroke="#0f3460" stroke-width="2"/>
  <text x="40" y="55" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#e94560">Claude</text>
  <text x="120" y="55" font-family="system-ui, sans-serif" font-size="14" fill="#a0a0a0">— 4000 字技术博客生成</text>
  <rect x="40" y="70" width="720" height="2" fill="#0f3460"/>
  <rect x="40" y="85" width="720" height="120" rx="6" fill="#1a1a2e"/>
  <text x="55" y="110" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#e94560">👤 User</text>
  <text x="55" y="135" font-family="system-ui, sans-serif" font-size="13" fill="#e0e0e0">请继续写第 4 部分，并回顾第 1 部分提出的假设是否仍然成立。</text>
  <text x="55" y="160" font-family="system-ui, sans-serif" font-size="12" fill="#a0a0a0">上下文：已输入约 3000 字的前文内容...</text>
  <rect x="40" y="220" width="720" height="200" rx="6" fill="#1a1a2e"/>
  <text x="55" y="245" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#e94560">🤖 Claude</text>
  <text x="55" y="270" font-family="system-ui, sans-serif" font-size="13" fill="#e0e0e0">### 4. 边界条件验证与修正</text>
  <text x="55" y="295" font-family="system-ui, sans-serif" font-size="13" fill="#e0e0e0">在继续深入之前，我需要回顾第 1 部分提出的核心假设：</text>
  <text x="55" y="320" font-family="system-ui, sans-serif" font-size="13" fill="#e0e0e0">> 「在高并发场景下，缓存命中率始终保持在 95% 以上。」</text>
  <text x="55" y="345" font-family="system-ui, sans-serif" font-size="13" fill="#ffc107">⚠️ 然而，根据第 2 部分的实验数据，当 QPS > 10,000 时，</text>
  <text x="55" y="370" font-family="system-ui, sans-serif" font-size="13" fill="#ffc107">缓存命中率下降至 87%。这意味着我们的原始假设在极端边界</text>
  <text x="55" y="395" font-family="system-ui, sans-serif" font-size="13" fill="#ffc107">条件下不成立。建议修正为：「在 QPS < 8,000 时，缓存命中</text>
  <text x="55" y="420" font-family="system-ui, sans-serif" font-size="13" fill="#ffc107">率保持在 95% 以上；超过该阈值时需启用二级缓存。」</text>
  <text x="40" y="450" font-family="system-ui, sans-serif" font-size="11" fill="#a0a0a0">截图时间：2026-05-22 | Claude Pro | 200K 上下文窗口全文记忆</text>
</svg>
