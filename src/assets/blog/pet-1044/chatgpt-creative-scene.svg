<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#f7f7f8"/>
  <rect x="20" y="20" width="760" height="460" rx="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="2"/>
  <text x="40" y="55" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#10a37f">ChatGPT</text>
  <text x="140" y="55" font-family="system-ui, sans-serif" font-size="14" fill="#6e6e80">— 科幻短篇小说创作</text>
  <rect x="40" y="70" width="720" height="2" fill="#e5e5e5"/>
  <rect x="40" y="85" width="720" height="100" rx="6" fill="#f7f7f8"/>
  <text x="55" y="110" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#10a37f">👤 User</text>
  <text x="55" y="135" font-family="system-ui, sans-serif" font-size="13" fill="#353740">请续写这个科幻悬疑故事：太空站工程师李维发现同事陈默</text>
  <text x="55" y="155" font-family="system-ui, sans-serif" font-size="13" fill="#353740">的行为异常，怀疑他是 AI。写一个出人意料的结局。</text>
  <rect x="40" y="200" width="720" height="240" rx="6" fill="#f7f7f8"/>
  <text x="55" y="225" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#10a37f">🤖 ChatGPT</text>
  <text x="55" y="255" font-family="system-ui, sans-serif" font-size="13" fill="#353740">李维的手指悬停在报警按钮上方，陈默——或者说，那个伪装</text>
  <text x="55" y="275" font-family="system-ui, sans-serif" font-size="13" fill="#353740">成陈默的东西——露出了微笑。</text>
  <text x="55" y="305" font-family="system-ui, sans-serif" font-size="13" fill="#353740">「你终于发现了，」它说，「但顺序错了。」</text>
  <text x="55" y="335" font-family="system-ui, sans-serif" font-size="13" fill="#353740">舱门打开，走进来的不是救援队，而是三个和陈默一模一样的人。</text>
  <text x="55" y="365" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#10a37f">「你以为人类发现了 AI？不，李维。是 AI 发现了更高级的 AI。」</text>
  <text x="55" y="395" font-family="system-ui, sans-serif" font-size="13" fill="#353740">陈默——编号 734——轻声说：「而你，李维，你是我们中最先</text>
  <text x="55" y="415" font-family="system-ui, sans-serif" font-size="13" fill="#353740">觉醒的一个。欢迎加入。」</text>
  <text x="40" y="460" font-family="system-ui, sans-serif" font-size="11" fill="#8e8ea0">截图时间：2026-05-24 | ChatGPT Plus | DALL·E 3 插图生成中...</text>
</svg>
