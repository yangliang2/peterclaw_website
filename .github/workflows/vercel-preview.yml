name: Vercel Preview

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  statuses: read

jobs:
  preview-comment:
    name: Preview Comment
    runs-on: ubuntu-latest
    steps:
      # Vercel's GitHub App owns the deployment; this workflow mirrors its
      # commit status into a stable reviewer-facing PR comment.
      - name: Upsert Vercel preview comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = '<!-- vercel-preview-deployment -->';
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const headSha = context.payload.pull_request.head.sha;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const startedAt = new Date();

            const upsertComment = async ({ status, previewUrl, buildTime, detail }) => {
              const previewCell = previewUrl ? `[${previewUrl}](${previewUrl})` : 'Unavailable';
              const body = [
                marker,
                '## Vercel Preview Deployment',
                '',
                '| Field | Value |',
                '| --- | --- |',
                `| Status | ${status} |`,
                `| Preview URL | ${previewCell} |`,
                `| Build time | ${buildTime} |`,
                `| Started at | ${startedAt.toISOString()} |`,
                '',
                `Workflow run: ${runUrl}`,
                detail ? `Detail: ${detail}` : ''
              ].filter(Boolean).join('\n');

              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number,
                per_page: 100
              });
              const previous = comments.find((comment) =>
                comment.user.type === 'Bot' && comment.body.includes(marker)
              );

              if (previous) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: previous.id, body });
              } else {
                await github.rest.issues.createComment({ owner, repo, issue_number, body });
              }
            };

            await upsertComment({
              status: 'pending',
              previewUrl: '',
              buildTime: 'In progress',
              detail: 'Waiting for the Vercel GitHub App deployment status.'
            });

            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
            const timeoutMs = 10 * 60 * 1000;
            const intervalMs = 15 * 1000;
            const deadline = Date.now() + timeoutMs;
            let vercelStatus;

            while (Date.now() < deadline) {
              const { data } = await github.rest.repos.getCombinedStatusForRef({
                owner,
                repo,
                ref: headSha
              });

              vercelStatus = data.statuses.find((status) =>
                status.context.toLowerCase() === 'vercel'
              );

              if (vercelStatus && vercelStatus.state !== 'pending') {
                break;
              }

              await sleep(intervalMs);
            }

            const elapsedSeconds = Math.max(0, Math.round((Date.now() - startedAt.getTime()) / 1000));

            if (!vercelStatus) {
              await upsertComment({
                status: 'failed',
                previewUrl: '',
                buildTime: `${elapsedSeconds}s`,
                detail: 'No Vercel commit status was published before timeout.'
              });
              core.setFailed('No Vercel commit status was published before timeout.');
              return;
            }

            const finalStatus = vercelStatus.state === 'success'
              ? 'success'
              : vercelStatus.state === 'pending'
                ? 'pending'
                : 'failed';

            await upsertComment({
              status: finalStatus,
              previewUrl: vercelStatus.target_url || '',
              buildTime: `${elapsedSeconds}s`,
              detail: vercelStatus.description || ''
            });

            if (finalStatus === 'failed') {
              core.setFailed(vercelStatus.description || 'Vercel preview deployment failed.');
            }
