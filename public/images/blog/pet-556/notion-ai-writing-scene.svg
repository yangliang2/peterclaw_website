<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#f7f7f7"/>
  <rect x="20" y="20" width="760" height="460" rx="8" fill="#ffffff" stroke="#e2e2e2" stroke-width="2"/>
  <text x="40" y="55" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#37352f">AI 笔记工具对比</text>
  <rect x="40" y="70" width="720" height="2" fill="#e2e2e2"/>
  <text x="40" y="105" font-family="system-ui, sans-serif" font-size="14" fill="#37352f">## 评测背景</text>
  <text x="40" y="130" font-family="system-ui, sans-serif" font-size="13" fill="#6b6b6b">2026 年，AI 笔记工具已经不再是「在编辑器里塞一个聊天框」那么简单...</text>
  <rect x="40" y="155" width="720" height="120" rx="6" fill="#f1f1ef"/>
  <text x="55" y="180" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#37352f">✨ AI 续写</text>
  <text x="55" y="205" font-family="system-ui, sans-serif" font-size="13" fill="#37352f">Notion AI 的「续写」功能是我用过的笔记工具中最「无感」的。在撰写技术博客时，</text>
  <text x="55" y="225" font-family="system-ui, sans-serif" font-size="13" fill="#37352f">我输入了大纲的几个标题，选中后按空格键调用 AI，它生成的段落不仅符合技术</text>
  <text x="55" y="245" font-family="system-ui, sans-serif" font-size="13" fill="#37352f">写作风格，还能自动引用我在同一工作区其他页面中提到的概念...</text>
  <rect x="55" y="260" width="80" height="24" rx="4" fill="#2383e2"/>
  <text x="95" y="277" font-family="system-ui, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">Accept</text>
  <rect x="145" y="260" width="80" height="24" rx="4" fill="#ffffff" stroke="#e2e2e2"/>
  <text x="185" y="277" font-family="system-ui, sans-serif" font-size="11" fill="#37352f" text-anchor="middle">Discard</text>
  <text x="40" y="310" font-family="system-ui, sans-serif" font-size="14" fill="#37352f">## 对比总表</text>
  <rect x="40" y="330" width="720" height="30" fill="#f7f7f7"/>
  <text x="55" y="350" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#37352f">维度</text>
  <text x="200" y="350" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#37352f">Notion AI</text>
  <text x="380" y="350" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#37352f">Obsidian Copilot</text>
  <text x="580" y="350" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#37352f">Capacities</text>
  <rect x="40" y="365" width="720" height="1" fill="#e2e2e2"/>
  <text x="55" y="385" font-family="system-ui, sans-serif" font-size="12" fill="#6b6b6b">AI 写作辅助</text>
  <text x="200" y="385" font-family="system-ui, sans-serif" font-size="12" fill="#2383e2">★★★★★</text>
  <text x="380" y="385" font-family="system-ui, sans-serif" font-size="12" fill="#6b6b6b">★★★★☆</text>
  <text x="580" y="385" font-family="system-ui, sans-serif" font-size="12" fill="#6b6b6b">★★★★★</text>
  <text x="40" y="430" font-family="system-ui, sans-serif" font-size="11" fill="#9ca3af">截图时间：2026-05-20 | Notion Plus + AI 附加订阅 | macOS 15.4</text>
</svg>